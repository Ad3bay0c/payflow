[databases]
payflow_auth    = host=postgres port=5432 dbname=payflow_auth
payflow_payment = host=postgres port=5432 dbname=payflow_payment
payflow_ledger  = host=postgres port=5432 dbname=payflow_ledger
payflow         = host=postgres port=5432 dbname=payflow

[pgbouncer]
listen_port     = 5432
listen_addr     = 0.0.0.0
auth_type       = plain
auth_file       = /etc/pgbouncer/userlist.txt
pool_mode       = transaction
max_client_conn = 1000
default_pool_size = 20
log_connections = 1
log_disconnections = 1
