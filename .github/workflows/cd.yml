name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # Gate — only proceed if CI passed
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Check CI result
        id: check
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "✅ CI passed — proceeding with deployment"
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "❌ CI failed — skipping deployment"
          fi

  # Push to ECR
  # Downloads the Docker image tarballs built by CI and pushes to ECR.
  # Images are never rebuilt — exact same binaries that passed all tests.
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should-deploy == 'true'
    environment: production

    steps:
      - name: Download Docker image tarballs from CI
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/docker-images

      - name: Download image tag from CI
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp

      - name: Read image tag
        id: tag
        run: echo "TAG=$(cat /tmp/image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Load and push images to ECR
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          for SERVICE in auth payment ledger notification fraud; do
            # Load the tarball built by CI
            docker load < /tmp/docker-images/${SERVICE}-service.tar.gz

            # Tag for ECR
            docker tag \
              payflow/${SERVICE}-service:${TAG} \
              ${REGISTRY}/payflow/${SERVICE}-service:${TAG}

            docker tag \
              payflow/${SERVICE}-service:${TAG} \
              ${REGISTRY}/payflow/${SERVICE}-service:latest

            # Push both tags — versioned and latest
            docker push ${REGISTRY}/payflow/${SERVICE}-service:${TAG}
            docker push ${REGISTRY}/payflow/${SERVICE}-service:latest

            echo "✅ ${SERVICE} pushed → ${REGISTRY}/payflow/${SERVICE}-service:${TAG}"
          done

  # Deploy
  # Runs Terraform to update infrastructure and deploy new image versions.
  # Terraform state tracks what's deployed — rollback is just apply with
  # the previous tag which Terraform already knows about.
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp

      - name: Read image tag
        id: tag
        run: echo "TAG=$(cat /tmp/image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          # Store Terraform state in S3 — never commit state files
          # S3 backend configured in infrastructure/terraform/backend.tf

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform
        env:
          TF_VAR_image_tag: ${{ steps.tag.outputs.TAG }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_registry: ${{ env.REGISTRY }}
        run: |
          terraform plan -out=tfplan -detailed-exitcode
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2' # 2 = changes to apply
        working-directory: infrastructure/terraform
        env:
          TF_VAR_image_tag: ${{ steps.tag.outputs.TAG }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_registry: ${{ env.REGISTRY }}
        run: terraform apply -auto-approve tfplan

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name payflow-cluster \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for rollout
        run: |
          for SERVICE in auth payment ledger notification fraud; do
            kubectl rollout status \
              deployment/${SERVICE}-service \
              -n payflow \
              --timeout=300s
            echo "✅ ${SERVICE} rolled out"
          done

      - name: Verify health
        run: |
          sleep 30
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            -n payflow -- sh -c "
              curl -sf http://auth-service:8081/health/live &&
              curl -sf http://payment-service:8082/health/live &&
              curl -sf http://ledger-service:8084/health/live &&
              curl -sf http://notification-service:8085/health/live &&
              curl -sf http://fraud-service:8086/health/live &&
              echo '✅ All services healthy'
            "

      - name: Notify success
        if: success()
        run: |
          echo "✅ PayFlow deployed"
          echo "Tag: ${{ steps.tag.outputs.TAG }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"

      # Rollback — Terraform knows the previous state.
      # Re-applying without the new tag reverts to the last known good state.
      - name: Rollback on failure
        if: failure()
        working-directory: infrastructure/terraform
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_registry: ${{ env.REGISTRY }}
          # Use latest stable tag stored in SSM Parameter Store
          TF_VAR_image_tag: ${{ secrets.LAST_STABLE_TAG }}
        run: |
          echo "❌ Deployment failed — rolling back to ${{ secrets.LAST_STABLE_TAG }}"
          terraform apply -auto-approve
          echo "⏪ Rollback complete"

      # Only update LAST_STABLE_TAG after confirmed successful deploy
      - name: Update last stable tag
        if: success()
        run: |
          aws ssm put-parameter \
            --name "/payflow/last-stable-tag" \
            --value "${{ steps.tag.outputs.TAG }}" \
            --type String \
            --overwrite
          echo "📌 Last stable tag updated to ${{ steps.tag.outputs.TAG }}"