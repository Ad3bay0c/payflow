name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"

jobs:
  # Tools Setup
  # Installs tools, generates all code, uploads as artifact.
  # Every downstream job downloads this artifact instead of regenerating.
  setup:
    name: Setup — Generate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Generate proto files
        run: make proto-gen

      - name: Generate sqlc files
        run: make sqlc-generate

      # Upload generated files so all downstream jobs share the same output.
      # This means proto and sqlc are generated exactly once per CI run.
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: |
            proto/gen/
            services/auth/internal/db/
            services/payment/internal/db/
            services/ledger/internal/db/
            services/notification/internal/db/
          retention-days: 1

  # Quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Install quality tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: go vet
        run: |
          cd services/auth               && go vet ./...
          cd ../../services/payment      && go vet ./...
          cd ../../services/ledger       && go vet ./...
          cd ../../services/notification && go vet ./...
          cd ../../services/fraud        && go vet ./...

      - name: staticcheck
        run: |
          cd services/auth               && staticcheck ./...
          cd ../../services/payment      && staticcheck ./...
          cd ../../services/ledger       && staticcheck ./...
          cd ../../services/notification && staticcheck ./...
          cd ../../services/fraud        && staticcheck ./...

      - name: govulncheck
        run: |
          cd services/auth               && govulncheck ./...
          cd ../../services/payment      && govulncheck ./...
          cd ../../services/ledger       && govulncheck ./...
          cd ../../services/notification && govulncheck ./...
          cd ../../services/fraud        && govulncheck ./...

  # Test
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: setup

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payflow
          POSTGRES_PASSWORD: payflow_secret
          POSTGRES_DB: payflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Run tests
        env:
          TEST_DB_URL: postgres://payflow:payflow_secret@localhost:5432/payflow_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        run: |
          cd services/auth               && go test ./... -v -race -timeout 60s
          cd ../../services/payment      && go test ./... -v -race -timeout 60s
          cd ../../services/ledger       && go test ./... -v -race -timeout 60s
          cd ../../services/notification && go test ./... -v -race -timeout 60s
          cd ../../services/fraud        && go test ./... -v -race -timeout 60s

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-code

      - name: Build all Go binaries
        run: |
          cd services/auth               && go build ./...
          cd ../../services/payment      && go build ./...
          cd ../../services/ledger       && go build ./...
          cd ../../services/notification && go build ./...
          cd ../../services/fraud        && go build ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: tag
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker images
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          for SERVICE in auth payment ledger notification fraud; do
            docker build \
              -f services/${SERVICE}/Dockerfile \
              -t payflow/${SERVICE}-service:${TAG} \
              -t payflow/${SERVICE}-service:latest \
              .
            echo "✅ Built payflow/${SERVICE}-service:${TAG}"
          done

      - name: Scan for vulnerabilities — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: payflow/auth-service:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Save Docker images as tarballs — the CD pipeline loads these
      # instead of rebuilding. Images are built exactly once.
      - name: Export Docker images as tarballs
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          mkdir -p /tmp/docker-images
          for SERVICE in auth payment ledger notification fraud; do
            docker save payflow/${SERVICE}-service:${TAG} \
              | gzip > /tmp/docker-images/${SERVICE}-service.tar.gz
            echo "✅ Exported ${SERVICE}-service.tar.gz"
          done

      - name: Upload Docker image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/docker-images/
          # Keep for 1 day — enough time for CD to pick them up
          retention-days: 1

      # Export the tag so CD knows which version to deploy
      - name: Upload image tag
        run: echo "${{ steps.tag.outputs.TAG }}" > /tmp/image-tag.txt

      - name: Upload image tag file
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: /tmp/image-tag.txt
          retention-days: 1
